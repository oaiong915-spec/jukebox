<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGM 주크박스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --bg2: #16161d;
    --bg3: #1e1e28;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8e6f0;
    --text2: #8a87a0;
    --text3: #5a5770;
    --accent: #c084fc;
    --accent2: #a855f7;
    --accent-bg: rgba(192,132,252,0.1);
    --accent-border: rgba(192,132,252,0.25);
    --green: #4ade80;
    --green-bg: rgba(74,222,128,0.1);
    --amber: #fbbf24;
    --amber-bg: rgba(251,191,36,0.1);
    --red: #f87171;
    --radius: 10px;
    --radius-lg: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(139,92,246,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(192,132,252,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .app {
    width: 100%;
    max-width: 460px;
    position: relative;
    z-index: 1;
  }
  .header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .card-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  input[type=text], input[type=range] {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .15s;
  }
  input[type=text] {
    width: 100%;
    padding: 10px 14px;
  }
  input[type=text]:focus { border-color: var(--accent-border); }
  input[type=text]::placeholder { color: var(--text3); }
  .btn {
    padding: 10px 18px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--bg3); border-color: var(--border2); }
  .btn:active { transform: scale(.97); }
  .btn-accent {
    background: var(--accent-bg);
    border-color: var(--accent-border);
    color: var(--accent);
    font-weight: 500;
  }
  .btn-accent:hover { background: rgba(192,132,252,0.18); }
  .row { display: flex; gap: 8px; align-items: center; }
  .flex1 { flex: 1; }
  .divider {
    text-align: center;
    font-size: 12px;
    color: var(--text3);
    margin: .75rem 0;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 42%;
    height: 1px;
    background: var(--border);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    color: var(--text2);
    background: var(--bg3);
  }
  .badge.gm { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent); }
  .badge.guest { background: var(--amber-bg); border-color: rgba(251,191,36,0.25); color: var(--amber); }
  .badge.online { background: var(--green-bg); border-color: rgba(74,222,128,0.25); color: var(--green); }
  .now-playing {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .np-top { display: flex; gap: 14px; align-items: center; margin-bottom: 14px; }
  .album-art {
    width: 60px; height: 60px;
    border-radius: var(--radius);
    background: var(--bg3);
    border: 1px solid var(--border);
    overflow: hidden;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .album-art img { width: 100%; height: 100%; object-fit: cover; }
  .album-art svg { opacity: .3; }
  .np-info { flex: 1; min-width: 0; }
  .np-title {
    font-size: 15px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .np-badges { display: flex; gap: 5px; flex-wrap: wrap; }
  .controls { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .play-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid var(--accent-border);
    background: var(--accent-bg);
    color: var(--accent);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; flex-shrink: 0;
  }
  .play-btn:hover { background: rgba(192,132,252,0.2); }
  .btn-sm {
    width: 32px; height: 32px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; flex-shrink: 0; font-size: 13px;
  }
  .btn-sm:hover { background: var(--bg3); color: var(--text); }
  .progress {
    flex: 1; height: 3px;
    background: var(--border2);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width .4s linear;
    pointer-events: none;
  }
  .time { font-size: 11px; color: var(--text3); font-family: 'Space Mono', monospace; white-space: nowrap; }
  .vol-row { display: flex; align-items: center; gap: 8px; }
  .vol-icon { font-size: 12px; color: var(--text3); }
  input[type=range] {
    flex: 1; -webkit-appearance: none; height: 3px; border: none; padding: 0;
    accent-color: var(--accent);
  }
  .pl-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background .12s;
  }
  .pl-item:hover { background: var(--bg3); }
  .pl-item.active { background: var(--accent-bg); }
  .pl-num { font-size: 11px; color: var(--text3); width: 16px; text-align: center; flex-shrink: 0; font-family: 'Space Mono', monospace; }
  .pl-item.active .pl-num { color: var(--accent); }
  .pl-thumb { width: 36px; height: 26px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: var(--bg3); }
  .pl-name { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pl-del {
    font-size: 11px; color: var(--text3); padding: 2px 6px;
    border-radius: 4px; opacity: 0; transition: opacity .1s; cursor: pointer;
  }
  .pl-item:hover .pl-del { opacity: 1; }
  .pl-del:hover { background: rgba(248,113,113,0.1); color: var(--red); }
  .pl-empty { text-align: center; padding: 1.5rem; color: var(--text3); font-size: 13px; line-height: 1.8; }
  .url-row { display: flex; gap: 6px; margin-bottom: 12px; }
  .url-row input { flex: 1; }
  .alert {
    font-size: 13px; padding: 10px 14px;
    border-radius: var(--radius);
    margin-bottom: 1rem;
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    color: var(--accent);
    line-height: 1.6;
  }
  .alert.err { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.25); color: var(--red); }
  .alert.success { background: var(--green-bg); border-color: rgba(74,222,128,0.25); color: var(--green); }
  .hidden { display: none !important; }
  #setup, #player { }
  .room-code-big {
    font-family: 'Space Mono', monospace;
    font-size: 26px; font-weight: 700;
    letter-spacing: 8px;
    color: var(--accent);
    text-align: center;
    padding: .75rem 0;
  }
  .sync-indicator {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--text3);
  }
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text3);
    animation: pulse 2s infinite;
  }
  .sync-dot.live { background: var(--green); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .guest-info {
    font-size: 13px; color: var(--text2); line-height: 1.7;
    margin-bottom: 12px;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">TRPG BGM SYNC</div>
    <div class="title">주크박스 🎲</div>
  </div>

  <!-- SETUP -->
  <div id="setup">
    <div class="card">
      <div class="card-title">새 룸 만들기 (GM)</div>
      <div class="row">
        <input type="text" id="gm-name" placeholder="세션 이름 (예: 어둠의 던전 3화)" class="flex1">
        <button class="btn btn-accent" onclick="createRoom()">만들기</button>
      </div>
    </div>
    <div class="divider">또는</div>
    <div class="card">
      <div class="card-title">룸 참가하기 (플레이어)</div>
      <div class="row">
        <input type="text" id="join-code" placeholder="룸 코드 입력 (예: RAVEN42)" maxlength="10" style="text-transform:uppercase" class="flex1">
        <button class="btn" onclick="joinRoom()">참가</button>
      </div>
    </div>
    <div id="setup-msg" class="hidden"></div>
  </div>

  <!-- PLAYER -->
  <div id="player" class="hidden">
    <!-- Now Playing -->
    <div class="now-playing">
      <div class="np-top">
        <div class="album-art" id="album-art">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M10 9l5 3-5 3V9z"/></svg>
        </div>
        <div class="np-info">
          <div class="np-title" id="np-title">대기 중...</div>
          <div class="np-badges">
            <span id="badge-role" class="badge gm">👑 GM</span>
            <span id="badge-room" class="badge"></span>
            <span id="badge-online" class="badge online">● 1명</span>
          </div>
        </div>
      </div>
      <div class="controls" id="gm-controls">
        <button class="play-btn" id="play-btn" onclick="togglePlay()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="btn-sm" onclick="prevSong()" title="이전">⏮</button>
        <button class="btn-sm" onclick="nextSong()" title="다음">⏭</button>
        <div class="progress" id="progress" onclick="seek(event)">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <span class="time" id="time">0:00</span>
      </div>
      <div class="vol-row">
        <span class="vol-icon">🔈</span>
        <input type="range" min="0" max="100" value="80" id="vol" oninput="setVol(this.value)">
        <span class="vol-icon">🔊</span>
        <span class="sync-indicator" id="sync-ind">
          <span class="sync-dot" id="sync-dot"></span>
          <span id="sync-label">대기</span>
        </span>
      </div>
    </div>

    <!-- GM Panel -->
    <div id="gm-panel" class="hidden">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div class="card-title" style="margin:0">플레이리스트</div>
          <div style="display:flex;gap:6px">
            <button class="btn" style="font-size:12px;padding:6px 12px" onclick="copyCode()">코드 복사</button>
            <button class="btn" style="font-size:12px;padding:6px 12px;color:var(--text3)" onclick="leaveRoom()">나가기</button>
          </div>
        </div>
        <div class="url-row">
          <input type="text" id="yt-url" placeholder="YouTube URL 또는 영상 ID">
          <button class="btn btn-accent" onclick="addSong(true)">재생</button>
          <button class="btn" onclick="addSong(false)">추가</button>
        </div>
        <div id="pl-list"></div>
        <div id="pl-empty" class="pl-empty">플레이리스트가 비어 있어요.<br>YouTube 링크를 추가해보세요!</div>
      </div>
    </div>

    <!-- Guest Panel -->
    <div id="guest-panel" class="hidden">
      <div class="card">
        <div class="card-title">게스트 모드</div>
        <div class="guest-info">GM이 재생하는 BGM이 자동으로 동기화됩니다.<br>소리가 나지 않으면 아래 버튼을 눌러주세요.</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-accent flex1" onclick="manualSync()">지금 동기화</button>
          <button class="btn" onclick="leaveRoom()" style="color:var(--text3)">나가기</button>
        </div>
      </div>
      <div class="vol-row" style="padding:0 4px">
        <span class="vol-icon">🔈</span>
        <input type="range" min="0" max="100" value="80" id="guest-vol" oninput="setVol(this.value)">
        <span class="vol-icon">🔊</span>
      </div>
    </div>
  </div>
</div>

<!-- YouTube IFrame API -->
<div id="yt-wrap" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden">
  <div id="yt-player"></div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpW1LqWFPaFrPBHuH1NvJA93FlyKZDleM",
  authDomain: "trpg-jukebox-d7110.firebaseapp.com",
  databaseURL: "https://trpg-jukebox-d7110-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "trpg-jukebox-d7110",
  storageBucket: "trpg-jukebox-d7110.firebasestorage.app",
  messagingSenderId: "208176725806",
  appId: "1:208176725806:web:ddb6e91604b50193fa84bf"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
window._db = db;
window._ref = ref;
window._set = set;
window._onValue = onValue;
window._get = get;
window._fbReady = true;
document.dispatchEvent(new Event('fb-ready'));
</script>

<script>
const S = {
  role: null, code: null, name: null,
  playlist: [], idx: -1, playing: false, vol: 80,
  player: null, playerReady: false,
  broadcastTimer: null, pollTimer: null, progressTimer: null,
  lastVid: null, listenerRef: null
};

function $(id){ return document.getElementById(id); }

function genCode(){
  const w=['RAVEN','EMBER','STORM','VALE','IRON','MIST','NOIR','SAGE','DUSK','WOLF'];
  return w[Math.floor(Math.random()*w.length)] + Math.floor(10+Math.random()*90);
}

function extractVid(url){
  if(!url) return null;
  let m = url.match(/[?&]v=([^&#]{11})/);
  if(m) return m[1];
  m = url.match(/youtu\.be\/([^?&#]{11})/);
  if(m) return m[1];
  if(/^[a-zA-Z0-9_-]{11}$/.test(url.trim())) return url.trim();
  return null;
}

function thumb(vid){ return `https://img.youtube.com/vi/${vid}/mqdefault.jpg`; }

function showMsg(msg, type='info'){
  const el = $('setup-msg');
  el.className = 'alert ' + (type==='err'?'err':type==='success'?'success':'');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function waitFb(cb){
  if(window._fbReady){ cb(); return; }
  document.addEventListener('fb-ready', cb, {once:true});
}

async function createRoom(){
  const name = $('gm-name').value.trim() || '무제 세션';
  const code = genCode();
  S.role='gm'; S.code=code; S.name=name;
  S.playlist=[]; S.idx=-1; S.playing=false;
  waitFb(async()=>{
    await window._set(window._ref(window._db, `rooms/${code}/meta`), {name, gm:true, ts:Date.now()});
    await pushState();
    enterPlayer();
    showAlert(`룸 "${name}" 생성! 코드: ${code}`, 'success');
  });
}

async function joinRoom(){
  const code = $('join-code').value.trim().toUpperCase();
  if(!code){ showMsg('룸 코드를 입력해주세요.','err'); return; }
  waitFb(async()=>{
    const snap = await window._get(window._ref(window._db, `rooms/${code}/meta`));
    if(!snap.exists()){ showMsg('룸을 찾을 수 없어요.','err'); return; }
    S.role='guest'; S.code=code; S.name=snap.val().name;
    enterPlayer();
    startListening();
  });
}

function enterPlayer(){
  $('setup').classList.add('hidden');
  $('player').classList.remove('hidden');
  $('badge-room').textContent = S.code;
  if(S.role==='gm'){
    $('badge-role').textContent='👑 GM';
    $('badge-role').className='badge gm';
    $('gm-panel').classList.remove('hidden');
    $('guest-panel').classList.add('hidden');
    $('gm-controls').style.display='flex';
    renderPl();
    initYT();
    startBroadcast();
  } else {
    $('badge-role').textContent='🎭 플레이어';
    $('badge-role').className='badge guest';
    $('gm-panel').classList.add('hidden');
    $('guest-panel').classList.remove('hidden');
    $('gm-controls').style.display='none';
    initYT();
  }
}

function showAlert(msg, type){
  const d = document.createElement('div');
  d.className='alert '+(type==='success'?'success':'');
  d.textContent=msg;
  $('player').prepend(d);
  setTimeout(()=>d.remove(), 4000);
}

function leaveRoom(){
  if(S.broadcastTimer) clearInterval(S.broadcastTimer);
  if(S.pollTimer) clearInterval(S.pollTimer);
  if(S.progressTimer) clearInterval(S.progressTimer);
  if(S.listenerRef) S.listenerRef();
  S.role=null; S.code=null;
  $('player').classList.add('hidden');
  $('setup').classList.remove('hidden');
  $('setup-msg').classList.add('hidden');
  $('gm-name').value=''; $('join-code').value='';
}

function copyCode(){
  navigator.clipboard.writeText(S.code).then(()=>{
    const b=event.currentTarget; b.textContent='복사됨!';
    setTimeout(()=>{ b.textContent='코드 복사'; },2000);
  }).catch(()=> prompt('코드:', S.code));
}

async function pushState(){
  if(!S.code || S.role!=='gm') return;
  const curTime = S.player && S.playerReady && S.player.getCurrentTime ? S.player.getCurrentTime() : 0;
  await window._set(window._ref(window._db, `rooms/${S.code}/state`), {
    playlist: S.playlist,
    idx: S.idx,
    playing: S.playing,
    vid: S.playlist[S.idx]?.vid || null,
    seekTo: curTime,
    ts: Date.now()
  });
}

function startBroadcast(){
  if(S.broadcastTimer) clearInterval(S.broadcastTimer);
  S.broadcastTimer = setInterval(pushState, 2000);
}

function startListening(){
  if(!window._fbReady){ document.addEventListener('fb-ready', startListening, {once:true}); return; }
  const stateRef = window._ref(window._db, `rooms/${S.code}/state`);
  S.listenerRef = window._onValue(stateRef, snap=>{
    if(!snap.exists()) return;
    const d = snap.val();
    const age = Date.now() - d.ts;
    if(age > 20000) return;
    setSyncDot(true);
    if(d.playlist) S.playlist = d.playlist;
    if(typeof d.idx==='number') S.idx = d.idx;
    S.playing = d.playing;
    if(d.vid){
      $('np-title').textContent = d.playlist?.[d.idx]?.title || '재생 중';
      const art = $('album-art');
      art.innerHTML=`<img src="${thumb(d.vid)}" onerror="this.style.display='none'">`;
      if(S.player && S.playerReady){
        if(d.vid !== S.lastVid){
          S.lastVid = d.vid;
          S.player.loadVideoById(d.vid);
          const target = d.seekTo + (age/1000);
          setTimeout(()=>{ if(S.player.seekTo) S.player.seekTo(target, true); }, 800);
          if(!d.playing) setTimeout(()=>{ S.player.pauseVideo(); }, 1000);
        } else {
          const localT = S.player.getCurrentTime ? S.player.getCurrentTime() : 0;
          const serverT = d.seekTo + (age/1000);
          if(Math.abs(localT-serverT)>3) S.player.seekTo(serverT, true);
          const ps = S.player.getPlayerState ? S.player.getPlayerState() : -1;
          if(d.playing && ps!==1) S.player.playVideo();
          else if(!d.playing && ps===1) S.player.pauseVideo();
        }
      }
    } else {
      $('np-title').textContent='대기 중...';
      $('album-art').innerHTML=`<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M10 9l5 3-5 3V9z"/></svg>`;
    }
  });
}

function manualSync(){
  if(S.listenerRef) S.listenerRef();
  startListening();
  showAlert('동기화 요청 완료!','success');
}

function setSyncDot(live){
  const dot=$('sync-dot'), lbl=$('sync-label');
  if(live){ dot.className='sync-dot live'; lbl.textContent='동기화 중'; }
  else { dot.className='sync-dot'; lbl.textContent='대기'; }
}

function addSong(playNow){
  const url = $('yt-url').value.trim();
  const vid = extractVid(url);
  if(!vid){ showAlert('유효한 YouTube URL을 입력해주세요.','err'); return; }
  S.playlist.push({ url, vid, title:`트랙 ${S.playlist.length+1}` });
  $('yt-url').value='';
  renderPl();
  if(playNow || S.idx===-1) playSong(S.playlist.length-1);
  else pushState();
}

function renderPl(){
  const list=$('pl-list'), empty=$('pl-empty');
  if(!S.playlist.length){ list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  list.innerHTML = S.playlist.map((s,i)=>`
    <div class="pl-item ${i===S.idx?'active':''}" onclick="playSong(${i})">
      <span class="pl-num">${i===S.idx&&S.playing?'▶':i+1}</span>
      <img class="pl-thumb" src="${thumb(s.vid)}" onerror="this.style.display='none'">
      <span class="pl-name">${s.title}</span>
      <span class="pl-del" onclick="event.stopPropagation();removeSong(${i})">✕</span>
    </div>
  `).join('');
}

function removeSong(i){
  S.playlist.splice(i,1);
  if(S.idx>=i) S.idx=Math.max(-1,S.idx-1);
  renderPl(); pushState();
}

function playSong(i){
  if(i<0||i>=S.playlist.length) return;
  S.idx=i; S.playing=true;
  const s=S.playlist[i];
  S.lastVid=s.vid;
  $('np-title').textContent=s.title;
  $('album-art').innerHTML=`<img src="${thumb(s.vid)}" onerror="this.style.display='none'">`;
  updatePlayBtn(true);
  renderPl();
  if(S.player&&S.playerReady){ S.player.loadVideoById(s.vid); S.player.setVolume(S.vol); }
  pushState();
}

function togglePlay(){
  if(!S.player||!S.playerReady) return;
  if(S.playing){ S.player.pauseVideo(); S.playing=false; updatePlayBtn(false); }
  else { S.player.playVideo(); S.playing=true; updatePlayBtn(true); }
  pushState();
}

function updatePlayBtn(p){
  $('play-btn').innerHTML = p
    ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`
    : `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
}

function prevSong(){ if(S.idx>0) playSong(S.idx-1); }
function nextSong(){ if(S.idx<S.playlist.length-1) playSong(S.idx+1); else if(S.playlist.length) playSong(0); }

function setVol(v){ S.vol=parseInt(v); if(S.player&&S.playerReady) S.player.setVolume(S.vol); }

function seek(e){
  if(!S.player||!S.playerReady) return;
  const dur=S.player.getDuration?S.player.getDuration():0;
  if(!dur) return;
  const r=e.currentTarget.getBoundingClientRect();
  S.player.seekTo(dur*(e.clientX-r.left)/r.width, true);
}

function startProgress(){
  if(S.progressTimer) clearInterval(S.progressTimer);
  S.progressTimer=setInterval(()=>{
    if(!S.player||!S.playerReady) return;
    try{
      const cur=S.player.getCurrentTime?S.player.getCurrentTime():0;
      const dur=S.player.getDuration?S.player.getDuration():0;
      if(dur>0){
        $('progress-fill').style.width=(cur/dur*100)+'%';
        const m=Math.floor(cur/60),s=Math.floor(cur%60);
        $('time').textContent=m+':'+(s<10?'0':'')+s;
      }
    }catch(e){}
  }, 500);
}

let ytLoaded=false;
function initYT(){
  if(ytLoaded){ createYTPlayer(); return; }
  window.onYouTubeIframeAPIReady=()=>{ ytLoaded=true; createYTPlayer(); };
  const sc=document.createElement('script');
  sc.src='https://www.youtube.com/iframe_api';
  document.head.appendChild(sc);
  ytLoaded=false;
}

function createYTPlayer(){
  if(S.player) return;
  S.player=new YT.Player('yt-player',{
    height:'1',width:'1',
    playerVars:{autoplay:1,controls:0,rel:0},
    events:{
      onReady:(e)=>{
        S.playerReady=true;
        e.target.setVolume(S.vol);
        startProgress();
        if(S.role==='guest') startListening();
        setSyncDot(true);
      },
      onStateChange:(e)=>{
        if(e.data===YT.PlayerState.ENDED && S.role==='gm') nextSong();
      }
    }
  });
}
</script>
